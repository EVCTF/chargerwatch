<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChargerWatch.org &mdash; Maryland DCFC Map</title>
<meta name="description" content="Interactive map of Maryland DC fast charging stations tracked by ChargerWatch.org.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #F2F2F7;
  --bg-card:   #FFFFFF;
  --ink:       #1C1C1E;
  --ink-mid:   #3A3A3C;
  --ink-light: #8E8E93;
  --rule:      #E5E5EA;
  --amber:     #C17D2A;
  --amber-lt:  #F5E6CC;
  --blue:      #2B4B8C;
  --blue-lt:   #E8EEF8;
  --private:   #E8C97A;
  --radius:    10px;
  --shadow:    0 1px 4px rgba(0,0,0,0.10);
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── Nav ── */
#nav {
  background: var(--bg-card);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 48px; flex-shrink: 0;
}
#nav-logo { font-size: 13px; font-weight: 700; color: var(--ink); text-decoration: none; letter-spacing: -0.2px; }
#nav-logo span { color: var(--amber); }
#nav-back { font-size: 14px; color: var(--blue); text-decoration: none; display: flex; align-items: center; gap: 4px; }
#nav-back:hover { opacity: 0.7; }

/* ── Controls ── */
#controls-wrap {
  background: var(--bg-card);
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
}
#controls-main {
  padding: 8px 12px;
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.ctrl-label {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--ink-light);
}
.ctrl-sep { width: 1px; height: 20px; background: var(--rule); margin: 0 2px; }
.filter-btn {
  font-size: 12px; padding: 5px 11px;
  border: 1px solid var(--rule); background: var(--bg);
  border-radius: 20px; cursor: pointer;
  transition: all 0.15s; color: var(--ink);
  -webkit-tap-highlight-color: transparent;
}
.filter-btn.active-public  { background: var(--amber); color: #fff; border-color: var(--amber); }
.filter-btn.active-private { background: #b8922a; color: #fff; border-color: #b8922a; }
.filter-btn.active-all     { background: var(--ink); color: #fff; border-color: var(--ink); }
#pin-count { font-size: 12px; color: var(--ink-light); margin-left: auto; white-space: nowrap; }

/* ── Network filters ── */
#network-wrap {
  padding: 0 12px 8px;
  display: none;
}
#network-wrap.open { display: flex; flex-wrap: wrap; gap: 5px; }
.network-btn {
  font-size: 11px; padding: 3px 9px;
  border: 1px solid var(--rule); background: var(--bg);
  border-radius: 20px; cursor: pointer; color: var(--ink-mid);
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.network-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
#network-toggle {
  font-size: 12px; padding: 5px 11px;
  border: 1px solid var(--rule); background: var(--bg);
  border-radius: 20px; cursor: pointer; color: var(--ink-mid);
  display: flex; align-items: center; gap: 4px;
}
#network-toggle.open { color: var(--blue); border-color: var(--blue); background: var(--blue-lt); }
.filter-btn {
  font-size: 12px; padding: 5px 11px;
  border: 1px solid var(--rule); background: var(--bg);
  border-radius: 20px; cursor: pointer; color: var(--ink-mid);
  -webkit-tap-highlight-color: transparent;
}
.filter-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

/* ── Map ── */
#map-wrap { position: relative; flex: 1; overflow: hidden; }
#map { height: 100%; width: 100%; }
#map-loading {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 500; background: rgba(255,255,255,0.96);
  border: 1px solid var(--rule); border-radius: 10px;
  padding: 18px 24px; font-size: 14px; color: var(--ink-mid); text-align: center;
}
.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--rule); border-top-color: var(--amber);
  border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#map-scroll-overlay {
  position: absolute; inset: 0; z-index: 450;
  display: flex; align-items: center; justify-content: center;
  background: transparent; cursor: pointer;
}
#map-scroll-overlay span {
  background: rgba(0,0,0,0.55); color: #fff;
  font-size: 13px; padding: 8px 16px; border-radius: 20px;
  pointer-events: none; opacity: 0; transition: opacity 0.3s;
}
#map-scroll-overlay:hover span,
#map-scroll-overlay.hint span { opacity: 1; }
#map-scroll-overlay.dismissed { display: none; }

/* ── Legend ── */
#map-legend {
  position: absolute; bottom: 20px; left: 12px; z-index: 400;
  background: rgba(255,255,255,0.96); border: 1px solid var(--rule);
  border-radius: var(--radius); padding: 10px 13px; font-size: 11px; line-height: 1.4;
}
#map-legend h5 {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--ink-light); margin-bottom: 6px;
}
.leg-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; color: var(--ink-mid); }
.leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

/* ── Stats panel ── */
#stats-panel {
  position: absolute; top: 12px; right: 12px; z-index: 400;
  background: rgba(255,255,255,0.96); border: 1px solid var(--rule);
  border-radius: var(--radius); padding: 10px 14px; font-size: 12px; min-width: 160px;
}
#stats-panel h5 {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--ink-light); margin-bottom: 6px;
}
.stat-row { display: flex; justify-content: space-between; gap: 16px; color: var(--ink-mid); margin-bottom: 3px; }
.stat-num { font-weight: 600; color: var(--ink); }

/* ── Detail panel ── */
#detail-panel {
  position: absolute; bottom: 20px; right: 12px; z-index: 400;
  background: #fff; border: 1px solid var(--rule);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 14px 16px; width: 300px; max-height: 58vh; overflow-y: auto;
  display: none;
}
#detail-panel h3 { font-size: 14px; font-weight: 600; line-height: 1.4; padding-right: 24px; margin-bottom: 3px; }
.detail-meta { font-size: 13px; color: var(--ink-light); margin-bottom: 10px; line-height: 1.5; }
.detail-badge {
  display: inline-block; font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
}
.badge-public  { background: var(--amber-lt); color: var(--amber); }
.badge-private { background: #FBF3DC; color: #8a6420; }
.detail-actions { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.btn-action {
  font-size: 12px; padding: 6px 12px;
  background: var(--ink); color: #fff; border: none;
  border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block;
}
.btn-plugshare { font-size: 12px; color: var(--blue); text-decoration: none; }
#detail-close {
  position: absolute; top: 10px; right: 10px;
  background: none; border: none; color: var(--ink-light);
  font-size: 16px; cursor: pointer; line-height: 1;
}

/* ── Mobile ── */
@media (max-width: 600px) {
  .ctrl-label, .ctrl-sep { display: none; }
  #pin-count { display: none; }
  #detail-panel { bottom: 0; right: 0; left: 0; width: 100%; border-radius: var(--radius) var(--radius) 0 0; max-height: 50vh; }
  #map-legend { display: none; }
  #stats-panel { display: none; }
}
</style>
</head>
<body>

<nav id="nav">
  <a href="/" id="nav-logo">Charger<span>Watch</span>.org</a>
  <a href="/" id="nav-back">&#8249; Home</a>
</nav>

<div id="controls-wrap">
  <div id="controls-main">
    <span class="ctrl-label">Public DCFC</span>
    <span class="ctrl-sep"></span>
    <button id="network-toggle">Networks &#9660;</button>
    <button id="issues-toggle" class="filter-btn">Issues</button>
    <span id="pin-count"></span>
  </div>
  <div id="network-wrap" role="group" aria-label="Filter by network"></div>
</div>

<div id="map-wrap">
  <div id="map" role="application" aria-label="Maryland DCFC station map"></div>

  <div id="map-scroll-overlay" aria-hidden="true">
    <span>Click to interact with map</span>
  </div>

  <div id="map-loading" aria-live="polite">
    <div class="spinner"></div>Loading stations&hellip;
  </div>

  <div id="map-legend">
    <h5>ChargerWatch</h5>
    <div class="leg-row">
      <span class="leg-dot" style="background:transparent;border:2px solid var(--amber);width:11px;height:11px;"></span>Public DCFC site
    </div>
  </div>

  <div id="stats-panel">
    <h5>Current view</h5>
    <div class="stat-row"><span>Sites</span><span class="stat-num" id="stat-visible">-</span></div>
    <div class="stat-row"><span>Ports</span><span class="stat-num" id="stat-ports">-</span></div>
  </div>

  <div id="detail-panel" role="region" aria-label="Station detail" aria-live="polite">
    <button id="detail-close" aria-label="Close">&#x2715;</button>
    <h3 id="d-name"></h3>
    <div class="detail-meta" id="d-meta"></div>
    <div id="d-badge"></div>
    <div class="detail-actions" id="d-actions"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
(function() {
  var PROXY = 'https://script.google.com/macros/s/AKfycbwbiKT8mCWSwMVcgDdRqKm95lsovhNYhSCKPZ6Q03y5uMfKauOr9YLaqqxVJs6Xx3Q/exec';
  var STATIONS_URL = PROXY + '?sheet=stations';
  var ISSUES_URL   = PROXY + '?sheet=issues';

  var AMBER   = '#C17D2A';
  var activeNetworks = {}; // network name -> true (all on by default)
  var issueMode = false;
  var issueMarkers = [];
  var ISSUE_COLOR = '#993C1D';
  var allStations = [], markerObjs = [];

  var map = L.map('map', {
    scrollWheelZoom: false, minZoom: 7, maxZoom: 17,
    maxBounds: [[37.8, -80.0], [40.2, -74.8]],
    maxBoundsViscosity: 0.85
  });

  // Scroll overlay
  var overlay = document.getElementById('map-scroll-overlay');
  overlay.addEventListener('click', function() {
    map.scrollWheelZoom.enable();
    overlay.classList.add('dismissed');
  });
  var hintTimer;
  document.addEventListener('wheel', function(e) {
    var rect = document.getElementById('map').getBoundingClientRect();
    if (!overlay.classList.contains('dismissed') &&
        e.clientY >= rect.top && e.clientY <= rect.bottom) {
      overlay.classList.add('hint');
      clearTimeout(hintTimer);
      hintTimer = setTimeout(function() { overlay.classList.remove('hint'); }, 1800);
    }
  }, { passive: true });

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  // ── CSV parser ──
  function parseCSV(txt) {
    var lines = txt.trim().split('\n');
    var hdrs = splitLine(lines[0]);
    return lines.slice(1).map(function(l) {
      var v = splitLine(l), o = {};
      hdrs.forEach(function(h, i) { o[h.trim()] = (v[i] || '').trim(); });
      return o;
    });
  }
  function splitLine(l) {
    var res = [], cur = '', q = false;
    for (var i = 0; i < l.length; i++) {
      var c = l[i];
      if (c === '"') { q = !q; }
      else if (c === ',' && !q) { res.push(cur); cur = ''; }
      else { cur += c; }
    }
    res.push(cur); return res;
  }

  // ── Icon ──
  function makeIcon(s) {
    var sz  = 11;
    var h = '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:transparent;border:2px solid '+AMBER+';box-sizing:border-box;"></div>';
    return L.divIcon({ html: h, className: '', iconSize: [sz, sz], iconAnchor: [sz/2, sz/2] });
  }

  function makeIssueIcon() {
    var sz = 13;
    var h = '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:transparent;border:2.5px solid '+ISSUE_COLOR+';box-sizing:border-box;"></div>';
    return L.divIcon({ html: h, className: '', iconSize: [sz, sz], iconAnchor: [sz/2, sz/2] });
  }

  // ── Detail panel ──
  function showDetail(s) {
    document.getElementById('d-name').textContent = s.name;
    document.getElementById('d-meta').innerHTML =
      '<strong>' + s.network + '</strong> &middot; ' + s.city +
      (s.kw ? ' &middot; ' + s.kw + ' kW' : '') +
      (s.connectors ? ' &middot; ' + s.connectors + ' port' + (s.connectors !== '1' ? 's' : '') : '') +
      (s.county ? ' &middot; ' + s.county + ' County' : '');
    document.getElementById('d-badge').innerHTML = '';
    var ah = '';
    if (s.plugshare) {
      ah += '<a href="' + s.plugshare + '" target="_blank" rel="noopener" class="btn-plugshare">View on PlugShare &#8599;</a>';
    }
    document.getElementById('d-actions').innerHTML = ah;
    document.getElementById('detail-panel').style.display = 'block';
  }

  function showIssueDetail(issue) {
    document.getElementById('d-name').textContent = issue.headline;
    document.getElementById('d-meta').innerHTML =
      '<strong>' + (issue.status || '') + '</strong>' +
      (issue.filing_reference ? ' &middot; ' + issue.filing_reference : '');
    document.getElementById('d-badge').innerHTML = '<span style="display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:#FDECEA;color:var(--red);">Issue</span>';
    document.getElementById('d-actions').innerHTML = '';
    document.getElementById('detail-panel').style.display = 'block';
  }

  document.getElementById('detail-close').onclick = function() {
    document.getElementById('detail-panel').style.display = 'none';
  };

  // ── Stats ──
  function updateStats(visible) {
    var ports = visible.reduce(function(n, s) { return n + (parseInt(s.connectors) || 0); }, 0);
    document.getElementById('stat-visible').textContent = visible.length.toLocaleString();
    document.getElementById('stat-ports').textContent   = ports.toLocaleString();
    document.getElementById('pin-count').textContent    = visible.length.toLocaleString() + ' public sites';
  }

  // ── Filters ──
  function applyFilters() {
    var visible = [];
    markerObjs.forEach(function(obj) {
      var s = obj.station;
      var matchNetwork = activeNetworks[s.network] !== false;
      if (matchNetwork) {
        if (!map.hasLayer(obj.marker)) obj.marker.addTo(map);
        visible.push(s);
      } else {
        if (map.hasLayer(obj.marker)) map.removeLayer(obj.marker);
      }
    });
    updateStats(visible);
    document.getElementById('detail-panel').style.display = 'none';
  }

  // Network toggle panel
  var networkOpen = false;
  document.getElementById('network-toggle').addEventListener('click', function() {
    networkOpen = !networkOpen;
    document.getElementById('network-wrap').classList.toggle('open', networkOpen);
    this.classList.toggle('open', networkOpen);
    this.innerHTML = 'Networks ' + (networkOpen ? '&#9650;' : '&#9660;');
  });

  // Issues toggle
  document.getElementById('issues-toggle').addEventListener('click', function() {
    issueMode = !issueMode;
    this.classList.toggle('active', issueMode);
    if (issueMode) {
      // Close network panel if open
      networkOpen = false;
      document.getElementById('network-wrap').classList.remove('open');
      document.getElementById('network-toggle').classList.remove('open');
      document.getElementById('network-toggle').innerHTML = 'Networks &#9660;';
      showIssues();
    } else {
      showDCFC();
    }
    document.getElementById('detail-panel').style.display = 'none';
  });

  // ── Build map ──
  function buildMap(stations) {
    // Network display name mapping (short labels for buttons)
    var networkLabels = {
      'Electrify America':   'Electrify Am',
      'Tesla':               'Tesla',
      'eVgo Network':        'eVgo',
      'Blink Network':       'Blink',
      'ChargePoint Network': 'ChargePoint',
      'FORD_CHARGE':         'Ford',
      'Non_Networked':       'No Network',
      'RIVIAN_ADVENTURE':    'Rivian',
      'FCN':                 'Francis Energy',
      'SHELL_RECHARGE':      'Shell Recharge',
      'Mercedes-Benz':       'MB'
    };

    // Count ports per network from raw data (allStations not yet built at this point)
    var publicRaw = stations.filter(function(row) {
      return row.public && row.public.trim().toUpperCase() === 'PUBLIC';
    });
    var networkPorts = {};
    publicRaw.forEach(function(row) {
      var net = row.ev_network ? row.ev_network.trim() : 'Unknown';
      networkPorts[net] = (networkPorts[net] || 0) + (parseInt(row.dcfc) || 0);
    });

    // Separate main networks from small ones (< 10 ports)
    var mainNetworks = {}, otherNetworks = [];
    Object.keys(networkPorts).forEach(function(net) {
      if (networkPorts[net] >= 10) {
        mainNetworks[net] = true;
      } else {
        otherNetworks.push(net);
      }
    });

    // All networks default to active
    Object.keys(networkPorts).forEach(function(net) {
      activeNetworks[net] = true;
    });
    var otherActive = true;

    // Build network toggle buttons
    var wrap = document.getElementById('network-wrap');
    var allNetActive = true;

    // All button first
    var allNetBtn = document.createElement('button');
    allNetBtn.className = 'network-btn active';
    allNetBtn.textContent = 'All';
    allNetBtn.id = 'network-all-btn';
    allNetBtn.addEventListener('click', function() {
      allNetActive = !allNetActive;
      Object.keys(networkPorts).forEach(function(net) { activeNetworks[net] = allNetActive; });
      otherActive = allNetActive;
      wrap.querySelectorAll('.network-btn').forEach(function(b) {
        b.classList.toggle('active', allNetActive);
      });
      applyFilters();
    });
    wrap.appendChild(allNetBtn);

    // Main network buttons sorted by port count descending
    var mainSorted = Object.keys(mainNetworks).sort(function(a, b) {
      return networkPorts[b] - networkPorts[a];
    });

    mainSorted.forEach(function(net) {
      var btn = document.createElement('button');
      btn.className = 'network-btn active';
      btn.textContent = networkLabels[net] || net;
      btn.setAttribute('data-network', net);
      btn.addEventListener('click', function() {
        var n = this.getAttribute('data-network');
        activeNetworks[n] = !activeNetworks[n];
        this.classList.toggle('active', activeNetworks[n]);
        applyFilters();
      });
      wrap.appendChild(btn);
    });

    // Other button (if any small networks exist)
    if (otherNetworks.length > 0) {
      var otherBtn = document.createElement('button');
      otherBtn.className = 'network-btn active';
      otherBtn.textContent = 'Other';
      otherBtn.addEventListener('click', function() {
        otherActive = !otherActive;
        otherNetworks.forEach(function(net) { activeNetworks[net] = otherActive; });
        otherBtn.classList.toggle('active', otherActive);
        applyFilters();
      });
      wrap.appendChild(otherBtn);
    }

    // Map stations
    allStations = stations.filter(function(row) {
      return row.public && row.public.trim().toUpperCase() === 'PUBLIC';
    }).map(function(row) {
      return {
        serial:     row.serial ? row.serial.trim() : '',
        name:       row.charging_location ? row.charging_location.trim() : '',
        network:    row.ev_network ? row.ev_network.trim() : 'Unknown',
        access:     'PUBLIC',
        city:       row.city ? row.city.trim() : '',
        county:     row.county ? row.county.trim() : '',
        lat:        parseFloat(row.latitude_n),
        lng:        parseFloat(row.longitude_n),
        kw:         row.kw ? row.kw.trim() : '',
        connectors: row.dcfc ? row.dcfc.trim() : '',
        plugshare:  row.plugshare_link ? row.plugshare_link.trim() : '',
      };
    }).filter(function(s) { return !isNaN(s.lat) && !isNaN(s.lng); });

    allStations.forEach(function(s) {
      var mk = L.marker([s.lat, s.lng], { icon: makeIcon(s) });
      mk.on('click', function() { showDetail(s); });
      mk.addTo(map);
      markerObjs.push({ marker: mk, station: s });
    });

    updateStats(allStations);
    document.getElementById('pin-count').textContent = allStations.length + ' stations';
    document.getElementById('map-loading').style.display = 'none';

    // Maryland boundary
    fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
      .then(function(r) { return r.json(); })
      .then(function(us) {
        var states = topojson.feature(us, us.objects.states);
        var md = states.features.filter(function(f) {
          return f.properties && f.properties.name === 'Maryland';
        })[0];
        if (md) {
          var mdL = L.geoJSON(md, { style: { color: '#2B4B8C', weight: 2, fill: false } }).addTo(map);
          map.fitBounds(mdL.getBounds(), { padding: [16, 16], maxZoom: 8 });
        } else { map.setView([39.0, -76.7], 8); }
      }).catch(function() { map.setView([39.0, -76.7], 8); });
  }

  // ── Issue markers ──
  function buildIssueMarkers(issues) {
    // Clear any existing issue markers
    issueMarkers.forEach(function(mk) { map.removeLayer(mk); });
    issueMarkers = [];

    var visible = issues.filter(function(iss) {
      return iss.visible_on_map && iss.visible_on_map.toUpperCase() === 'TRUE';
    });

    visible.forEach(function(iss) {
      var lat = parseFloat(iss.latitude);
      var lng = parseFloat(iss.longitude);
      if (isNaN(lat) || isNaN(lng)) return;
      var mk = L.marker([lat, lng], { icon: makeIssueIcon() });
      mk.on('click', function() { showIssueDetail(iss); });
      issueMarkers.push(mk);
    });
  }

  function showIssues() {
    // Hide all DCFC markers
    markerObjs.forEach(function(obj) { map.removeLayer(obj.marker); });
    // Show issue markers
    issueMarkers.forEach(function(mk) { mk.addTo(map); });
    document.getElementById('pin-count').textContent = issueMarkers.length + ' issues';
    updateStats([]);
  }

  function showDCFC() {
    // Hide issue markers
    issueMarkers.forEach(function(mk) { map.removeLayer(mk); });
    // Re-apply network filters to restore DCFC pins
    applyFilters();
  }

  // ── Fetch ──
  function fetchCSV(url) {
    var timeout = new Promise(function(_, reject) {
      setTimeout(function() { reject(new Error('Timed out')); }, 12000);
    });
    var request = fetch(url, { redirect: 'follow' })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      }).then(parseCSV);
    return Promise.race([request, timeout]);
  }

  Promise.all([fetchCSV(STATIONS_URL), fetchCSV(ISSUES_URL)])
    .then(function(results) {
      buildMap(results[0]);
      buildIssueMarkers(results[1]);
    })
    .catch(function() {
      document.getElementById('map-loading').innerHTML = 'Could not load station data. Please reload.';
    });

})();
</script>
</body>
</html>
