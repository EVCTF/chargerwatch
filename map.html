<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charger Map &mdash; ChargerWatch.org</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
<style>
/* Cluster styling to match ChargerWatch blue */
.marker-cluster-small,
.marker-cluster-medium,
.marker-cluster-large {
  background-color: rgba(37,81,192,0.25) !important;
}
.marker-cluster-small div,
.marker-cluster-medium div,
.marker-cluster-large div {
  background-color: rgba(37,81,192,0.7) !important;
  color: #fff !important;
  font-weight: 700 !important;
  font-size: 12px !important;
}
</style>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #F2F2F7;
  --bg-card:   #FFFFFF;
  --ink:       #1C1C1E;
  --ink-mid:   #3A3A3C;
  --ink-light: #8E8E93;
  --rule:      #E5E5EA;
  --blue:      #2551C0;
  --blue-lt:   #E8EEF8;
  --amber:     #2551C0;
  --red:       #993C1D;
  --radius:    10px;
  --shadow:    0 2px 12px rgba(0,0,0,0.12);
}
html, body { height: 100%; overflow: hidden; margin: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── Single slim top bar ── */
#top-bar {
  background: var(--bg-card);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; height: 48px; flex-shrink: 0;
  position: relative; z-index: 600;
}
#nav-back {
  font-size: 15px; color: var(--blue);
  text-decoration: none; display: flex; align-items: center; gap: 3px;
  font-weight: 500; white-space: nowrap;
}
#nav-title { font-size: 17px; font-weight: 600; color: var(--ink); }

/* ── Networks dropdown button ── */
#network-btn {
  font-size: 13px; font-weight: 500;
  padding: 6px 12px; border-radius: 20px;
  border: 1px solid var(--rule); background: var(--bg);
  cursor: pointer; color: var(--ink-mid);
  display: flex; align-items: center; gap: 5px;
  white-space: nowrap; -webkit-tap-highlight-color: transparent;
}
#network-btn.open { background: var(--blue-lt); color: var(--blue); border-color: var(--blue); }
#network-chevron { font-size: 14px; line-height: 1; transition: transform 0.2s; }
#network-chevron.open { transform: rotate(180deg); }

/* ── Floating network dropdown panel ── */
#network-dropdown {
  display: none;
  position: absolute;
  top: 52px; right: 12px;
  width: 180px;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  z-index: 700;
  overflow: hidden;
  max-height: 70vh;
  overflow-y: auto;
}
#network-dropdown.open { display: block; }
.net-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; border-bottom: 1px solid var(--rule);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  font-size: 14px; color: var(--ink-mid);
}
.net-item:last-child { border-bottom: none; }
.net-item:active { background: var(--bg); }
.net-item.all-row { font-weight: 600; color: var(--ink); background: var(--bg); }
.net-check {
  width: 18px; height: 18px; border-radius: 4px;
  border: 2px solid var(--rule); background: var(--bg-card);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.net-check.checked { background: var(--blue); border-color: var(--blue); }
.net-check.checked::after { content: '✓'; font-size: 11px; color: #fff; font-weight: 700; }
.net-label { flex: 1; }
.net-count { font-size: 12px; color: var(--ink-light); }

/* ── Map ── */
#map-wrap { position: relative; flex: 1; overflow: hidden; }
#map { height: 100%; width: 100%; }

/* ── Loading ── */
#map-loading {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 500; background: rgba(255,255,255,0.96);
  border: 1px solid var(--rule); border-radius: 10px;
  padding: 18px 24px; font-size: 14px; color: var(--ink-mid); text-align: center;
}
.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--rule); border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Scroll overlay ── */
#map-scroll-overlay {
  position: absolute; inset: 0; z-index: 450;
  display: flex; align-items: center; justify-content: center;
  background: transparent; cursor: pointer;
}
#map-scroll-overlay span {
  background: rgba(0,0,0,0.55); color: #fff;
  font-size: 13px; padding: 8px 16px; border-radius: 20px;
  pointer-events: none; opacity: 0; transition: opacity 0.3s;
}
#map-scroll-overlay:hover span,
#map-scroll-overlay.hint span { opacity: 1; }
#map-scroll-overlay.dismissed { display: none; }

/* ── Legend ── */
#map-legend {
  position: absolute; bottom: 20px; left: 12px; z-index: 400;
  background: rgba(255,255,255,0.96); border: 1px solid var(--rule);
  border-radius: var(--radius); padding: 10px 13px; font-size: 11px; line-height: 1.4;
}
#map-legend h5 {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--ink-light); margin-bottom: 6px;
}
.leg-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; color: var(--ink-mid); }
.leg-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

/* ── Stats panel ── */
#stats-panel {
  position: absolute; top: 12px; right: 12px; z-index: 400;
  background: rgba(255,255,255,0.96); border: 1px solid var(--rule);
  border-radius: var(--radius); padding: 10px 14px; font-size: 12px; min-width: 150px;
}
#stats-panel h5 {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--ink-light); margin-bottom: 6px;
}
.stat-row { display: flex; justify-content: space-between; gap: 16px; color: var(--ink-mid); margin-bottom: 3px; }
.stat-num { font-weight: 600; color: var(--ink); }
#pin-count {
  position: absolute; bottom: 20px; right: 12px; z-index: 400;
  background: rgba(255,255,255,0.9); border: 1px solid var(--rule);
  border-radius: 20px; padding: 5px 12px;
  font-size: 12px; color: var(--ink-mid);
}

/* ── Detail panel ── */
#detail-panel {
  position: absolute; bottom: 20px; right: 12px; z-index: 400;
  background: #fff; border: 1px solid var(--rule);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 14px 16px; width: 300px; max-height: 55vh; overflow-y: auto;
  display: none;
}
#detail-panel h3 { font-size: 17px; font-weight: 600; line-height: 1.4; padding-right: 24px; margin-bottom: 6px; }
#d-name-link { cursor: pointer; color: inherit; text-decoration: none; display: block; }
#d-name-link:hover { opacity: 0.75; }
.detail-meta { font-size: 13px; color: var(--ink-light); margin-bottom: 10px; line-height: 1.5; }
.detail-actions { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.btn-plugshare { font-size: 12px; color: var(--blue); text-decoration: none; }
#detail-close {
  position: absolute; top: 10px; right: 10px;
  background: none; border: none; color: var(--ink-light);
  font-size: 16px; cursor: pointer; line-height: 1;
}

/* ── Mobile ── */
@media (max-width: 600px) {
  #detail-panel { bottom: 0; right: 0; left: 0; width: 100%; border-radius: var(--radius) var(--radius) 0 0; max-height: 50vh; }
  #map-legend { display: none; }
  #stats-panel { display: none; }
  #pin-count { bottom: 8px; right: 8px; }
}
</style>
</head>
<body>

<!-- Single top bar -->
<div id="top-bar">
  <div style="display:flex;align-items:center;gap:12px;">
    <a href="/" id="nav-back">&#8249; Back</a>
    <span id="nav-title">Map</span>
  </div>
  <button id="network-btn" aria-expanded="false" aria-haspopup="true">
    Filters <span id="network-chevron">▾</span>
  </button>
</div>

<!-- Floating network dropdown -->
<div id="network-dropdown" role="listbox" aria-label="Filter by network" aria-multiselectable="true">
  <!-- Populated by JS -->
</div>

<div id="map-wrap">
  <div id="map" role="application" aria-label="Maryland DCFC station map"></div>

  <div id="map-scroll-overlay" aria-hidden="true">
    <span>Click to interact with map</span>
  </div>

  <div id="map-loading" aria-live="polite">
    <div class="spinner"></div>Loading stations&hellip;
  </div>

  <div id="map-legend">
    <h5>ChargerWatch</h5>
    <div class="leg-row">
      <svg xmlns="http://www.w3.org/2000/svg" width="9" height="15" viewBox="0 0 12 20" style="flex-shrink:0;margin-right:2px;"><path d="M6 0C2.686 0 0 2.686 0 6c0 4.418 6 14 6 14s6-9.582 6-14C12 2.686 9.314 0 6 0z" fill="#2551C0"/><circle cx="6" cy="6" r="2.5" fill="rgba(255,255,255,0.7)"/></svg>
      Public DCFC
    </div>
    <div class="leg-row">
      <svg xmlns="http://www.w3.org/2000/svg" width="9" height="15" viewBox="0 0 12 20" style="flex-shrink:0;margin-right:2px;"><path d="M6 0C2.686 0 0 2.686 0 6c0 4.418 6 14 6 14s6-9.582 6-14C12 2.686 9.314 0 6 0z" fill="#8E8E93"/><circle cx="6" cy="6" r="2.5" fill="rgba(255,255,255,0.7)"/></svg>
      Restricted
    </div>
  </div>

  <div id="stats-panel">
    <h5>Current view</h5>
    <div class="stat-row"><span>Sites</span><span class="stat-num" id="stat-visible">-</span></div>
    <div class="stat-row"><span>Ports</span><span class="stat-num" id="stat-ports">-</span></div>
  </div>

  <div id="pin-count"></div>

  <div id="detail-panel" role="region" aria-label="Station detail" aria-live="polite">
    <button id="detail-close" aria-label="Close">&#x2715;</button>
    <h3 id="d-name"></h3>
    <div class="detail-meta" id="d-meta"></div>
    <div class="detail-actions" id="d-actions"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
(function() {
  var PROXY = 'https://script.google.com/macros/s/AKfycbwbiKT8mCWSwMVcgDdRqKm95lsovhNYhSCKPZ6Q03y5uMfKauOr9YLaqqxVJs6Xx3Q/exec';
  var STATIONS_URL = PROXY + '?sheet=stations';
  var ISSUES_URL   = PROXY + '?sheet=issues';

  var BLUE = '#2551C0';
  var GREY = '#8E8E93';
  var ISSUE_COLOR = '#993C1D';
  var activeNetworks = {};
  var allActive = true;
  var allStations = [], markerObjs = [];
  var clusterGroup;
  var lastZoomedSerial = null;
  var issueMarkers = [];
  var networkPortCounts = {};

  var networkLabels = {
    'Electrify America':   'Electrify Am.',
    'Tesla':               'Tesla',
    'eVgo Network':        'eVgo',
    'Blink Network':       'Blink',
    'ChargePoint Network': 'ChargePoint',
    'FORD_CHARGE':         'Ford Charge',
    'Non_Networked':       'No Network',
    'RIVIAN_ADVENTURE':    'Rivian',
    'FCN':                 'Francis Energy',
    'SHELL_RECHARGE':      'Shell Recharge',
    'Mercedes-Benz':       'MB'
  };

  var map = L.map('map', {
    scrollWheelZoom: false, minZoom: 7, maxZoom: 19,
    maxBounds: [[37.6, -80.0], [39.85, -74.8]],
    maxBoundsViscosity: 0.85
  });

  // Marker cluster group
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 40,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    disableClusteringAtZoom: 14
  });
  map.addLayer(clusterGroup);

  // Scroll overlay
  var overlay = document.getElementById('map-scroll-overlay');
  overlay.addEventListener('click', function() {
    map.scrollWheelZoom.enable();
    overlay.classList.add('dismissed');
  });
  var hintTimer;
  document.addEventListener('wheel', function(e) {
    var rect = document.getElementById('map').getBoundingClientRect();
    if (!overlay.classList.contains('dismissed') &&
        e.clientY >= rect.top && e.clientY <= rect.bottom) {
      overlay.classList.add('hint');
      clearTimeout(hintTimer);
      hintTimer = setTimeout(function() { overlay.classList.remove('hint'); }, 1800);
    }
  }, { passive: true });

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  // ── CSV ──
  function parseCSV(txt) {
    var lines = txt.trim().split('\n');
    var hdrs = splitLine(lines[0]);
    return lines.slice(1).map(function(l) {
      var v = splitLine(l), o = {};
      hdrs.forEach(function(h, i) { o[h.trim()] = (v[i] || '').trim(); });
      return o;
    });
  }
  function splitLine(l) {
    var res = [], cur = '', q = false;
    for (var i = 0; i < l.length; i++) {
      var c = l[i];
      if (c === '"') { q = !q; }
      else if (c === ',' && !q) { res.push(cur); cur = ''; }
      else { cur += c; }
    }
    res.push(cur); return res;
  }

  // ── Icons ──
  function makeIcon(color) {
    var col = color || BLUE;
    var w = 12, h = 20;
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'" viewBox="0 0 12 20">'
      + '<path d="M6 0C2.686 0 0 2.686 0 6c0 4.418 6 14 6 14s6-9.582 6-14C12 2.686 9.314 0 6 0z" fill="'+col+'"/>'
      + '<circle cx="6" cy="6" r="2.5" fill="rgba(255,255,255,0.7)"/>'
      + '</svg>';
    return L.divIcon({ html: svg, className: '', iconSize: [w, h], iconAnchor: [w/2, h] });
  }
  function makeIssueIcon() {
    var w = 12, h = 20;
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'" viewBox="0 0 12 20">'
      + '<path d="M6 0C2.686 0 0 2.686 0 6c0 4.418 6 14 6 14s6-9.582 6-14C12 2.686 9.314 0 6 0z" fill="'+ISSUE_COLOR+'"/>'
      + '<circle cx="6" cy="6" r="2.5" fill="rgba(255,255,255,0.7)"/>'
      + '</svg>';
    return L.divIcon({ html: svg, className: '', iconSize: [w, h], iconAnchor: [w/2, h] });
  }

  // ── Detail ──
  function showDetail(s) {
    var nameEl = document.getElementById('d-name');
    nameEl.innerHTML = '<span id="d-name-link" title="Click to zoom to this station">' + s.name + '</span>';
    document.getElementById('d-name-link').addEventListener('click', function() {
      if (lastZoomedSerial === s.serial && map.getZoom() >= 17) {
        // Already zoomed in on this station — zoom out
        map.setView([s.lat, s.lng], 13, { animate: true });
        lastZoomedSerial = null;
      } else {
        // Zoom in to maximum
        map.setView([s.lat, s.lng], 18, { animate: true });
        lastZoomedSerial = s.serial;
      }
    });
    var metaLine1 = '<strong>' + s.network + '</strong> &middot; ' + s.city +
      (s.county ? ' &middot; ' + s.county + ' Co.' : '');
    var metaLine2 = (s.kw ? s.kw + ' kW' : '') +
      (s.kw && s.connectors ? ' &middot; ' : '') +
      (s.connectors ? s.connectors + ' port' + (s.connectors !== '1' ? 's' : '') : '');
    document.getElementById('d-meta').innerHTML =
      metaLine1 +
      (metaLine2 ? '<br><span style="color:var(--ink-mid);">' + metaLine2 + '</span>' : '');
    var ah = '';
    if (s.plugshare) {
      ah += '<a href="' + s.plugshare + '" target="_blank" rel="noopener" class="btn-plugshare">View on PlugShare &#8599;</a>';
    }
    document.getElementById('d-actions').innerHTML = ah;
    document.getElementById('detail-panel').style.display = 'block';
  }

  function showIssueDetail(issue) {
    document.getElementById('d-name').textContent = issue.headline || issue.site_name || 'Issue';
    document.getElementById('d-meta').innerHTML =
      (issue.status ? '<strong>' + issue.status + '</strong>' : '') +
      (issue.filing_reference ? ' &middot; ' + issue.filing_reference : '');
    document.getElementById('d-actions').innerHTML = '';
    document.getElementById('detail-panel').style.display = 'block';
  }

  document.getElementById('detail-close').onclick = function() {
    document.getElementById('detail-panel').style.display = 'none';
  };

  // ── Stats ──
  function updateStats(visible) {
    var ports = visible.reduce(function(n, s) { return n + (parseInt(s.connectors) || 0); }, 0);
    document.getElementById('stat-visible').textContent = visible.length.toLocaleString();
    document.getElementById('stat-ports').textContent   = ports.toLocaleString();
    document.getElementById('pin-count').textContent    = visible.length.toLocaleString() + ' public sites';
  }

  // ── Filters ──
  function applyFilters() {
    var visible = [];
    clusterGroup.clearLayers();
    markerObjs.forEach(function(obj) {
      var s = obj.station;
      var show = activeNetworks[s.network] !== false
        && stationMatchesKw(s)
        && (includeDealerships || s.facility_type !== 'CAR_DEALER')
        && (includeRestricted  || s.access !== 'PRIVATE');
      if (show) { clusterGroup.addLayer(obj.marker); visible.push(s); }
    });
    updateStats(visible);
    document.getElementById('detail-panel').style.display = 'none';
    updateCheckboxes();
  }

  // ── Network dropdown ──
  var dropdownOpen = false;
  var networkBtn = document.getElementById('network-btn');
  var dropdown   = document.getElementById('network-dropdown');
  var chevron    = document.getElementById('network-chevron');

  function toggleDropdown() {
    dropdownOpen = !dropdownOpen;
    dropdown.classList.toggle('open', dropdownOpen);
    networkBtn.classList.toggle('open', dropdownOpen);
    chevron.classList.toggle('open', dropdownOpen);
    networkBtn.setAttribute('aria-expanded', dropdownOpen);
  }

  networkBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleDropdown();
  });

  document.addEventListener('click', function(e) {
    if (dropdownOpen && !dropdown.contains(e.target) && e.target !== networkBtn) {
      dropdownOpen = false;
      dropdown.classList.remove('open');
      networkBtn.classList.remove('open');
      chevron.classList.remove('open');
      networkBtn.setAttribute('aria-expanded', false);
    }
  });

  function updateCheckboxes() {
    dropdown.querySelectorAll('.net-check[data-network]').forEach(function(chk) {
      var net = chk.getAttribute('data-network');
      chk.classList.toggle('checked', activeNetworks[net] !== false);
    });
    // Update All checkbox
    var allChecked = Object.keys(activeNetworks).every(function(n) { return activeNetworks[n] !== false; });
    var allChk = dropdown.querySelector('.net-check[data-network="__all__"]');
    if (allChk) allChk.classList.toggle('checked', allChecked);
  }

  // Filter state
  var activePlugs = { ccs: true, nacs: true, tesla_only: true, chademo: true };
  var activeKw    = { k50: true, k51_149: true, k150_249: true, k250_349: true, k350plus: true };
  var includeDealerships = true;
  var includeRestricted  = false;

  // Network proxy for plug type
  var TESLA_ONLY_NETS = ['Tesla'];
  var NACS_NETS       = ['Tesla']; // Tesla with MagicDock/NACS
  var CCS_NETS        = ['Electrify America','ChargePoint Network','eVgo Network','Blink Network',
                         'FORD_CHARGE','FCN','SHELL_RECHARGE','IONNA','BP Pulse','InCharge',
                         'EV Connect','Mercedes-Benz','OpConnect','7CHARGE','Quick Charge',
                         'ezVOLTz','ChargeLab','Nayax','JOLT','Red E'];
  var CHADEMO_NETS    = ['Non_Networked']; // CHAdeMO mostly legacy/non-networked

  function stationMatchesPlugs(s) {
    var net = s.network;
    var isTeslaOnly = TESLA_ONLY_NETS.indexOf(net) >= 0;
    if (isTeslaOnly && activePlugs.tesla_only) return true;
    if (!isTeslaOnly) {
      if (activePlugs.ccs && CCS_NETS.indexOf(net) >= 0) return true;
      if (activePlugs.nacs) return true; // NACS increasingly everywhere
      if (activePlugs.chademo && CHADEMO_NETS.indexOf(net) >= 0) return true;
      if (activePlugs.ccs || activePlugs.nacs || activePlugs.chademo) return true;
    }
    return false;
  }

  function stationMatchesKw(s) {
    var kw = parseInt(s.kw);
    if (isNaN(kw)) return true; // unknown kW always shows
    if (activeKw.k50      && kw <= 50)              return true;
    if (activeKw.k51_149  && kw >= 51  && kw <= 149) return true;
    if (activeKw.k150_249 && kw >= 150 && kw <= 249) return true;
    if (activeKw.k250_349 && kw >= 250 && kw <= 349) return true;
    if (activeKw.k350plus && kw >= 350)              return true;
    return false;
  }

  function makeSection(label) {
    var sec = document.createElement('div');
    sec.style.cssText = 'padding:8px 14px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#8E8E93;background:#F2F2F7;border-bottom:1px solid #E5E5EA;';
    sec.textContent = label;
    return sec;
  }

  function makeCheckRow(label, checked, onToggle, extraStyle) {
    var row = document.createElement('div');
    row.className = 'net-item' + (extraStyle ? '' : '');
    if (extraStyle) row.style.cssText = extraStyle;
    var chkEl = document.createElement('div');
    chkEl.className = 'net-check' + (checked ? ' checked' : '');
    var labelEl = document.createElement('span');
    labelEl.className = 'net-label';
    labelEl.textContent = label;
    row.appendChild(chkEl);
    row.appendChild(labelEl);
    row.addEventListener('click', function() {
      var isChecked = chkEl.classList.contains('checked');
      onToggle(!isChecked, chkEl);
    });
    return row;
  }

  function buildDropdown(networks) {
    dropdown.innerHTML = '';

    // ── NETWORKS section ──
    dropdown.appendChild(makeSection('Networks'));

    // All Networks row
    var allRow = document.createElement('div');
    allRow.className = 'net-item all-row';
    var allChk = document.createElement('div');
    allChk.className = 'net-check checked';
    allChk.setAttribute('data-network', '__all__');
    var allLbl = document.createElement('span');
    allLbl.className = 'net-label';
    allLbl.textContent = 'All Networks';
    allRow.appendChild(allChk);
    allRow.appendChild(allLbl);
    allRow.addEventListener('click', function() {
      allActive = !allChk.classList.contains('checked');
      Object.keys(activeNetworks).forEach(function(n) { activeNetworks[n] = allActive; });
      applyFilters();
    });
    dropdown.appendChild(allRow);

    var sorted = Object.keys(networks).sort(function(a, b) {
      return (networkPortCounts[b] || 0) - (networkPortCounts[a] || 0);
    });
    var mainNets = [], otherNets = [];
    sorted.forEach(function(net) {
      if ((networkPortCounts[net] || 0) >= 10) mainNets.push(net);
      else otherNets.push(net);
    });

    mainNets.forEach(function(net) {
      var label = networkLabels[net] || net;
      var row = document.createElement('div');
      row.className = 'net-item';
      var chk = document.createElement('div');
      chk.className = 'net-check checked';
      chk.setAttribute('data-network', net);
      var lbl = document.createElement('span');
      lbl.className = 'net-label';
      lbl.textContent = label;
      row.appendChild(chk);
      row.appendChild(lbl);
      row.addEventListener('click', function() {
        var isChecked = chk.classList.contains('checked');
        activeNetworks[net] = !isChecked;
        applyFilters();
      });
      dropdown.appendChild(row);
    });

    if (otherNets.length > 0) {
      var otherActive2 = true;
      var otherRow = document.createElement('div');
      otherRow.className = 'net-item';
      var otherChk = document.createElement('div');
      otherChk.className = 'net-check checked';
      otherChk.setAttribute('data-network', '__other__');
      var otherLbl = document.createElement('span');
      otherLbl.className = 'net-label';
      otherLbl.textContent = 'Other';
      otherRow.appendChild(otherChk);
      otherRow.appendChild(otherLbl);
      otherRow.addEventListener('click', function() {
        otherActive2 = !otherChk.classList.contains('checked');
        otherNets.forEach(function(net) { activeNetworks[net] = otherActive2; });
        applyFilters();
        otherChk.classList.toggle('checked', otherActive2);
      });
      dropdown.appendChild(otherRow);
    }

    // ── ALL PLUGS section ──
    dropdown.appendChild(makeSection('All Plugs'));

    // All Plugs toggle row
    var allPlugsRow = document.createElement('div');
    allPlugsRow.className = 'net-item all-row';
    var allPlugsChk = document.createElement('div');
    allPlugsChk.className = 'net-check checked';
    allPlugsChk.id = 'all-plugs-chk';
    var allPlugsLbl = document.createElement('span');
    allPlugsLbl.className = 'net-label';
    allPlugsLbl.textContent = 'All Plugs';
    allPlugsRow.appendChild(allPlugsChk);
    allPlugsRow.appendChild(allPlugsLbl);
    allPlugsRow.addEventListener('click', function() {
      var allOn = !allPlugsChk.classList.contains('checked');
      Object.keys(activePlugs).forEach(function(k) { activePlugs[k] = allOn; });
      dropdown.querySelectorAll('.plug-chk').forEach(function(c) { c.classList.toggle('checked', allOn); });
      allPlugsChk.classList.toggle('checked', allOn);
      applyFilters();
    });
    dropdown.appendChild(allPlugsRow);

    [
      { label: 'CCS',        key: 'ccs' },
      { label: 'NACS',       key: 'nacs' },
      { label: 'Tesla-Only', key: 'tesla_only' },
      { label: 'CHAdeMO',    key: 'chademo' }
    ].forEach(function(plug) {
      var row = document.createElement('div');
      row.className = 'net-item';
      var chk = document.createElement('div');
      chk.className = 'net-check checked plug-chk';
      var lbl = document.createElement('span');
      lbl.className = 'net-label';
      lbl.textContent = plug.label;
      row.appendChild(chk);
      row.appendChild(lbl);
      row.addEventListener('click', function() {
        var val = !chk.classList.contains('checked');
        activePlugs[plug.key] = val;
        chk.classList.toggle('checked', val);
        var allOn = Object.keys(activePlugs).every(function(k) { return activePlugs[k]; });
        allPlugsChk.classList.toggle('checked', allOn);
        applyFilters();
      });
      dropdown.appendChild(row);
    });

    // ── ALL kW MAX section ──
    dropdown.appendChild(makeSection('All kW Max'));

    // All kW toggle row
    var allKwRow = document.createElement('div');
    allKwRow.className = 'net-item all-row';
    var allKwChk = document.createElement('div');
    allKwChk.className = 'net-check checked';
    allKwChk.id = 'all-kw-chk';
    var allKwLbl = document.createElement('span');
    allKwLbl.className = 'net-label';
    allKwLbl.textContent = 'All kW';
    allKwRow.appendChild(allKwChk);
    allKwRow.appendChild(allKwLbl);
    allKwRow.addEventListener('click', function() {
      var allOn = !allKwChk.classList.contains('checked');
      Object.keys(activeKw).forEach(function(k) { activeKw[k] = allOn; });
      dropdown.querySelectorAll('.kw-chk').forEach(function(c) { c.classList.toggle('checked', allOn); });
      allKwChk.classList.toggle('checked', allOn);
      applyFilters();
    });
    dropdown.appendChild(allKwRow);

    [
      { label: '≤50 kW',   key: 'k50' },
      { label: '51-149 kW', key: 'k51_149' },
      { label: '150-249 kW',key: 'k150_249' },
      { label: '250-349 kW',key: 'k250_349' },
      { label: '350+ kW',   key: 'k350plus' }
    ].forEach(function(band) {
      var row = document.createElement('div');
      row.className = 'net-item';
      var chk = document.createElement('div');
      chk.className = 'net-check checked kw-chk';
      var lbl = document.createElement('span');
      lbl.className = 'net-label';
      lbl.textContent = band.label;
      row.appendChild(chk);
      row.appendChild(lbl);
      row.addEventListener('click', function() {
        var val = !chk.classList.contains('checked');
        activeKw[band.key] = val;
        chk.classList.toggle('checked', val);
        var allOn = Object.keys(activeKw).every(function(k) { return activeKw[k]; });
        allKwChk.classList.toggle('checked', allOn);
        applyFilters();
      });
      dropdown.appendChild(row);
    });

    // ── INCLUDE section ──
    dropdown.appendChild(makeSection('Include'));

    // Dealerships - preselected
    var dealRow = makeCheckRow('Dealerships', true, function(val, chk) {
      includeDealerships = val;
      chk.classList.toggle('checked', val);
      applyFilters();
    });
    dropdown.appendChild(dealRow);

    // Restricted - not preselected
    var restRow = makeCheckRow('Restricted', false, function(val, chk) {
      includeRestricted = val;
      chk.classList.toggle('checked', val);
      applyFilters();
    });
    dropdown.appendChild(restRow);
  }

  // ── Build map ──
  function buildMap(stations, issues) {
    var networks = {};
    // Include all rows; PUBLIC drives color, PRIVATE shown only when Restricted is checked
    var pub = stations.filter(function(row) {
      return row.public && row.public.trim().toUpperCase() === 'PUBLIC';
    });

    pub.forEach(function(row) {
      var net = row.ev_network ? row.ev_network.trim() : 'Unknown';
      networks[net] = true;
      activeNetworks[net] = true;
      networkPortCounts[net] = (networkPortCounts[net] || 0) + (parseInt(row.dcfc) || 0);
    });

    buildDropdown(networks);

    allStations = stations.map(function(row) {
      return {
        serial:     row.serial ? row.serial.trim() : '',
        name:       row.charging_location ? row.charging_location.trim() : '',
        network:    row.ev_network ? row.ev_network.trim() : 'Unknown',
        city:       row.city ? row.city.trim() : '',
        county:     row.county ? row.county.trim() : '',
        lat:        parseFloat(row.latitude_n),
        lng:        parseFloat(row.longitude_n),
        kw:         row.kw ? row.kw.trim() : '',
        connectors: row.dcfc ? row.dcfc.trim() : '',
        plugshare:  row.plugshare_link ? row.plugshare_link.trim() : '',
        facility_type: row.facility_type ? row.facility_type.trim() : '',
        access:     row.public ? row.public.trim().toUpperCase() : 'PUBLIC'
      };
    }).filter(function(s) { return !isNaN(s.lat) && !isNaN(s.lng); });

    allStations.forEach(function(s) {
      var color = s.access === 'PRIVATE' ? GREY : BLUE;
      var mk = L.marker([s.lat, s.lng], { icon: makeIcon(color) });
      mk.on('click', function() { showDetail(s); });
      if (s.access !== 'PRIVATE') clusterGroup.addLayer(mk);
      markerObjs.push({ marker: mk, station: s });
    });

    updateStats(allStations);

    // Issue markers
    if (issues) {
      issues.filter(function(iss) {
        return iss.visible_on_map && iss.visible_on_map.toUpperCase() === 'TRUE';
      }).forEach(function(iss) {
        var lat = parseFloat(iss.lat);
        var lng = parseFloat(iss.lon);
        if (isNaN(lat) || isNaN(lng)) return;
        var mk = L.marker([lat, lng], { icon: makeIssueIcon() });
        mk.on('click', function() { showIssueDetail(iss); });
        issueMarkers.push(mk);
        mk.addTo(map);
      });
    }

    document.getElementById('map-loading').style.display = 'none';

    // Maryland boundary
    fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
      .then(function(r) { return r.json(); })
      .then(function(us) {
        var states = topojson.feature(us, us.objects.states);
        var md = states.features.filter(function(f) {
          return f.properties && f.properties.name === 'Maryland';
        })[0];
        if (md) {
          var mdL = L.geoJSON(md, { style: { color: '#2551C0', weight: 2, fill: false } }).addTo(map);
          map.fitBounds(mdL.getBounds(), { padding: [16, 16], maxZoom: 8 });
        } else { map.setView([39.0, -76.7], 8); }
      }).catch(function() { map.setView([39.0, -76.7], 8); });
  }

  // ── Fetch ──
  function fetchCSV(url) {
    var timeout = new Promise(function(_, reject) {
      setTimeout(function() { reject(new Error('Timed out')); }, 12000);
    });
    var req = fetch(url, { redirect: 'follow' })
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(parseCSV);
    return Promise.race([req, timeout]);
  }

  Promise.all([fetchCSV(STATIONS_URL), fetchCSV(ISSUES_URL)])
    .then(function(res) { buildMap(res[0], res[1]); })
    .catch(function() {
      document.getElementById('map-loading').innerHTML = 'Could not load station data. Please reload.';
    });

})();
</script>
