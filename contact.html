<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Contact &mdash; ChargerWatch.org</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #F2F2F7;
  --bg-card: #FFFFFF;
  --ink:     #1C1C1E;
  --ink-light:#8E8E93;
  --rule:    #E5E5EA;
  --blue:    #2551C0;
  --radius:  12px;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}
#nav {
  display: flex; align-items: center; gap: 12px;
  padding: 52px 16px 12px;
  background: var(--bg); flex-shrink: 0;
  border-bottom: 1px solid var(--rule);
}
#nav-back { font-size: 17px; color: var(--blue); text-decoration: none; }
#nav-title { font-size: 17px; font-weight: 600; }
#frame-wrap { flex: 1; overflow: hidden; }
#contact-frame {
  width: 100%; height: 100%;
  border: none; background: var(--bg-card);
}
</style>
</head>
<body>

<nav id="nav">
  <a href="/" id="nav-back">&#8249; Back</a>
  <span id="nav-title">Contact</span>
</nav>

<div id="frame-wrap">
  <iframe
    id="contact-frame"
    src="https://docs.google.com/forms/d/e/1FAIpQLSdeBMZNEH9VDmSy9W4IfYKkw7T5ih0DAgu5DSWevxFWTQUCpQ/viewform?embedded=true"
    title="Contact ChargerWatch"
    loading="lazy">
  </iframe>
</div>

</body>
</html>
